name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --prefer-offline

      - run: npm run lint --if-present

      - run: npm run typecheck --if-present

      - run: npm test --if-present

      - name: Build check
        env:
          NEXT_PUBLIC_APP_ID: ci-check
        run: npm run build
